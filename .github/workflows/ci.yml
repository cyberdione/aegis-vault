name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust (fmt + clippy + test + wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --lib --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --lib

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: wasm-pack build
        run: bash scripts/build-wasm.sh

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-vault-wasm
          path: pkg/
          retention-days: 7

  typescript:
    name: typescript (tsc)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: aegis-vault-wasm
          path: pkg/

      - name: npm ci
        run: npm ci --ignore-scripts

      - name: tsc
        run: npm run build:ts

  anonymous-guard:
    name: anonymous-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The vault never uses the word "anonymous" in any identifier, type,
      # comment, log line, or UI string. It collides with hyprstream's
      # Subject: anonymous concept. See README / plan "Naming" section.
      # Grep excludes this workflow file itself and CHANGELOG/docs history.
      - name: Forbid `anonymous` in source
        run: |
          set -e
          # Match `anonymous` but exclude comment lines that document the
          # naming ban itself (the guardrail references the term).
          matches=$(grep -rniE --include='*.rs' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.html' \
              'anonymous' crates/ src/ docs/examples/ 2>/dev/null \
              | grep -viE 'avoid|not named|collid|Subject' || true)
          if [ -n "$matches" ]; then
            echo "::error::Found 'anonymous' in source — the vault must not use this term (collides with hyprstream Subject). Use 'ephemeral' instead."
            echo "$matches"
            exit 1
          fi
          echo "ok: no 'anonymous' references"
